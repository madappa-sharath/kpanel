name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # goreleaser publishes the GitHub Release
      id-token: write  # cosign keyless signing via GitHub OIDC
    env:
      # Reject runs that would mutate go.mod/go.sum.
      GOFLAGS: -mod=readonly
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: server/go.mod
          cache: true
          cache-dependency-path: server/go.sum

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2

      # Source tarball for the Homebrew formula, which builds with Go only
      # (no Bun in the sandbox), so we ship a pre-built frontend inside it.
      - name: Build frontend
        run: cd web && bun install --frozen-lockfile && bun build.ts

      - name: Create source tarball with pre-built frontend
        run: |
          mkdir -p server/cmd/kpanel/public
          cp -r web/dist/. server/cmd/kpanel/public/
          TAG=${GITHUB_REF_NAME}
          TARBALL="/tmp/kpanel-src-${TAG}.tar.gz"
          tar czf "$TARBALL" \
            --transform "s|^|kpanel-${TAG}/|" \
            server/
          echo "SRC_TARBALL=$TARBALL" >> $GITHUB_ENV

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0

      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8  # v7.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload source tarball to release
        run: gh release upload ${{ github.ref_name }} ${{ env.SRC_TARBALL }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
