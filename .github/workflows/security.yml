name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Catch secrets that became known-bad after they landed.
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      # Keep Socket Firewall available before any future supported package
      # installs. Free mode supports npm/yarn/pnpm, pip/uv, and cargo; Go
      # module protection requires Socket Firewall Enterprise.
      - uses: socketdev/action@ba6de6cc0565af1f42295590380973573297e31f
        with:
          mode: firewall-free

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: server/go.mod

      # Install via `go install` so binaries inherit the same checksum-DB
      # trust root as the rest of our Go deps.
      - name: Install scanners
        run: |
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: gitleaks
        run: gitleaks detect --source . --redact --verbose --no-banner

      - name: govulncheck
        run: cd server && govulncheck ./...
