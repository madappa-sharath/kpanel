name: publish-package-metadata

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example v0.1.0)
        required: true

permissions:
  contents: read

jobs:
  publish-homebrew:
    if: ${{ vars.HOMEBREW_TAP_REPO != '' && secrets.HOMEBREW_TAP_PUSH_TOKEN != '' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download checksums
        run: |
          mkdir -p dist
          gh release download "${{ steps.tag.outputs.value }}" \
            --pattern "checksums.txt" \
            --dir dist

      - name: Generate formula
        run: |
          tag="${{ steps.tag.outputs.value }}"
          checksums="dist/checksums.txt"

          darwin_arm64_sha=$(grep "kpanel_${tag}_darwin_arm64.tar.gz" "$checksums" | awk '{print $1}')
          darwin_amd64_sha=$(grep "kpanel_${tag}_darwin_amd64.tar.gz" "$checksums" | awk '{print $1}')
          linux_arm64_sha=$(grep "kpanel_${tag}_linux_arm64.tar.gz" "$checksums" | awk '{print $1}')
          linux_amd64_sha=$(grep "kpanel_${tag}_linux_amd64.tar.gz" "$checksums" | awk '{print $1}')

          ./scripts/release/generate-homebrew-formula.sh \
            "$tag" \
            "$darwin_arm64_sha" \
            "$darwin_amd64_sha" \
            "$linux_arm64_sha" \
            "$linux_amd64_sha"

      - name: Push formula to tap repository
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          cp packaging/homebrew/kpanel.rb tap/Formula/kpanel.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/kpanel.rb
          if git diff --cached --quiet; then
            echo "No formula changes to publish"
            exit 0
          fi
          git commit -m "kpanel ${{ steps.tag.outputs.value }}"
          git push

  publish-scoop:
    if: ${{ vars.SCOOP_BUCKET_REPO != '' && secrets.SCOOP_BUCKET_PUSH_TOKEN != '' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUCKET_REPO: ${{ vars.SCOOP_BUCKET_REPO }}
      BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_PUSH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download checksums
        run: |
          mkdir -p dist
          gh release download "${{ steps.tag.outputs.value }}" \
            --pattern "checksums.txt" \
            --dir dist

      - name: Generate manifest
        run: |
          tag="${{ steps.tag.outputs.value }}"
          windows_sha=$(grep "kpanel_${tag}_windows_amd64.zip" dist/checksums.txt | awk '{print $1}')
          ./scripts/release/generate-scoop-manifest.sh "$tag" "$windows_sha"

      - name: Push manifest to Scoop bucket
        run: |
          git clone "https://x-access-token:${BUCKET_TOKEN}@github.com/${BUCKET_REPO}.git" bucket
          cp packaging/scoop/kpanel.json bucket/bucket/kpanel.json
          cd bucket
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/kpanel.json
          if git diff --cached --quiet; then
            echo "No Scoop changes to publish"
            exit 0
          fi
          git commit -m "kpanel ${{ steps.tag.outputs.value }}"
          git push
