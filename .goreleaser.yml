version: 2

before:
  hooks:
    - bash -c "cd web && bun install && bun build.ts"
    - bash -c "rm -rf server/cmd/kpanel/public && cp -r web/dist server/cmd/kpanel/public"

builds:
  - id: kpanel
    dir: server
    main: ./cmd/kpanel
    binary: kpanel
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "kpanel_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

# CycloneDX SBOM per archive — lets downstream consumers verify what was bundled.
sboms:
  - artifacts: archive

# Keyless cosign signing using GitHub OIDC (no key management needed).
# Verify with:
#   cosign verify-blob --certificate-identity-regexp \
#     'https://github.com/<owner>/kpanel/.github/workflows/release.yml@.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     --signature <sig> --certificate <cert> <artifact>
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

release:
  draft: false
  prerelease: auto
  extra_files:
    - glob: scripts/install.sh
    - glob: scripts/install.ps1

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
